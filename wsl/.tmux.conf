# ~/.tmux.conf - Arch WSL

# Mouse support
set -g mouse on
# Make copy mode selection work with mouse (hold Shift usually still uses terminal selection)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Pane splitting: keep current pane's path
bind '%' split-window -h -c '#{pane_current_path}'
bind '"' split-window    -c '#{pane_current_path}'
bind c new-window         -c '#{pane_current_path}'

# Pane borders: dim for inactive, bright for active
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour11,bold'

# Show pane index and title in the border, e.g. "0:vim"
set -g pane-border-format ' #{pane_index}:#{pane_title} '

# Background: active pane slightly darker, inactive normal
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=colour234'

# Prevent ssh from renaming window
set-option -g allow-rename off

# Faster ESC for Vim
set -s escape-time 0

# History and UX tweaks
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

# Statusline layout:
set -g status-style 'bg=colour234 fg=colour223'

set -g status-left-length 100
set -g status-left "#P: #T -> "

setw -g window-status-style 'fg=colour244,bg=colour234'
setw -g window-status-format '#I:#W'
setw -g window-status-current-style 'fg=colour0,bg=colour11,bold'
setw -g window-status-current-format '#I:#W'
set -g window-status-separator ' | '


set -g status-right-length 40
set -g status-right "#[fg=colour223]REMINDER: WIND DOWN SOON"

# Prefix + r to rename the current pane
bind r command-prompt -I '#{pane_title}' 'select-pane -T "%%"'

# Message style
set -g message-style 'fg=colour237 bg=colour3 bold'

# Mode style
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=colour1 bg=colour18 bold'
